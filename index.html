<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 FIFA World Cup — Team Base Camps</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <header class="header-bar">
    <span class="header-title">2026 FIFA World Cup Team Base Camps</span>
    <span class="header-sub">48 teams · USA · Canada · Mexico</span>
  </header>

  <div class="filter-panel">
    <div class="filter-label">Group filter</div>
    <button class="filter-btn active" data-group="all">All</button>
    <button class="filter-btn" data-group="A">A</button>
    <button class="filter-btn" data-group="B">B</button>
    <button class="filter-btn" data-group="C">C</button>
    <button class="filter-btn" data-group="D">D</button>
    <button class="filter-btn" data-group="E">E</button>
    <button class="filter-btn" data-group="F">F</button>
    <button class="filter-btn" data-group="G">G</button>
    <button class="filter-btn" data-group="H">H</button>
    <button class="filter-btn" data-group="I">I</button>
    <button class="filter-btn" data-group="J">J</button>
    <button class="filter-btn" data-group="K">K</button>
    <button class="filter-btn" data-group="L">L</button>

    <div class="filter-divider"></div>
    <div class="filter-label">Layer</div>
    <button class="filter-btn active" data-layer="all">All</button>
    <button class="filter-btn" data-layer="teams">Teams</button>
    <button class="filter-btn" data-layer="stadiums">Stadiums</button>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="map.js"></script>

  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "797a9dbc9d0b4386b776aa36d38f8c3e"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
